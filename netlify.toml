[build]
  command       = "npm run build"
  publish       = "dist"

# Edge functions directory — Netlify auto-discovers files here
[functions]
  node_bundler  = "esbuild"

# Route /api/tune-section to the edge function
[[edge_functions]]
  path     = "/api/tune-section"
  function = "tune-section"

# SPA catch-all — serve index.html for all non-asset routes
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
