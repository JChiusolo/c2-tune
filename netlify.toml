[build]
  command  = "npm run build"
  publish  = "dist"

# Lambda functions (server.js local dev mirror — not used in production)
[functions]
  node_bundler = "esbuild"

# Edge function — routes /api/tune-section to netlify/edge-functions/tune-section.js
[[edge_functions]]
  path     = "/api/tune-section"
  function = "tune-section"

# SPA catch-all
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
