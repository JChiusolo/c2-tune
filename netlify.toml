[build]
  command   = "npm run build"
  publish   = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from   = "/api/tune"
  to     = "/.netlify/functions/tune"
  status = 200

[[redirects]]
  from   = "/api/tune-section"
  to     = "/.netlify/functions/tune-section"
  status = 200

[[redirects]]
  from   = "/api/generate-csv"
  to     = "/.netlify/functions/generate-csv"
  status = 200

[[redirects]]
  from   = "/api/csv-status/:jobId"
  to     = "/.netlify/functions/csv-status"
  status = 200

[[redirects]]
  from   = "/api/health"
  to     = "/.netlify/functions/health"
  status = 200

# SPA fallback — must be last
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    
